{% extends "base.html" %}
{% block title %}Admin login — Pathway{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand"><span class="mark"></span>Pathway <span style="font-size:11px; color: var(--muted); font-family: var(--font-mono); font-weight:500;">admin</span></div>
    <h1>Admin login</h1>
    <p class="auth-sub">Manage advertisers, offers, affiliates, and payouts.</p>

    <form method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@platform.com" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p class="hint" style="text-align:center; margin-top:18px;">Demo credentials: admin@platform.com / admin1234</p>
  </div>
</div>
{% endblock %}
