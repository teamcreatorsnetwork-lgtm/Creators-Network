{% extends "base.html" %}
{% block title %}Log in — Pathway{% endblock %}
{% block body %}
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand"><span class="mark"></span>Pathway</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Log in to view your links and earnings.</p>

    <form method="POST">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <div class="auth-switch">New to Pathway? <a href="/signup">Create an account</a></div>
  </div>
</div>
{% endblock %}
